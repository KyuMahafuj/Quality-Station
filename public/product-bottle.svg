<svg width="240" height="360" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c98a"/>
      <stop offset="100%" stop-color="#c9a45c"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f9d5a"/>
      <stop offset="100%" stop-color="#0c7a3f"/>
    </linearGradient>
  </defs>

  <!-- pump nozzle -->
  <rect x="108" y="6" width="24" height="14" rx="4" fill="url(#capGrad)"/>
  <rect x="98" y="18" width="44" height="10" rx="5" fill="url(#capGrad)"/>
  <!-- pump neck -->
  <rect x="112" y="26" width="16" height="20" fill="#d9dde3"/>
  <!-- cap -->
  <path d="M92 44 h56 v26 a28 28 0 0 1 -56 0 z" fill="url(#capGrad)"/>
  <!-- shoulder -->
  <path d="M86 70 h68 l10 26 h-88 z" fill="url(#bodyGrad)"/>
  <!-- body -->
  <rect x="66" y="96" width="108" height="220" rx="14" fill="url(#bodyGrad)"/>
  <!-- base -->
  <rect x="66" y="304" width="108" height="18" rx="8" fill="#dfe3e9"/>

  <!-- brand wordmark -->
  <text x="120" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-style="italic" fill="#0b3fa0" font-weight="700">Care+</text>

  <!-- green leaf swoosh -->
  <path d="M66 210 C110 190 150 190 174 210 L174 316 L66 316 Z" fill="url(#leafGrad)" opacity="0.92"/>
  <path d="M66 232 C110 214 150 214 174 232" fill="none" stroke="#eafff1" stroke-width="3" opacity="0.6"/>

  <text x="120" y="270" text-anchor="middle" font-family="Poppins, sans-serif" font-size="13" font-weight="700" fill="#ffffff">HAIR FALL</text>
  <text x="120" y="286" text-anchor="middle" font-family="Poppins, sans-serif" font-size="13" font-weight="700" fill="#ffffff">RESCUE</text>
</svg>
